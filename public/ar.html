<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>The Power of Many — AR</title>
  <link rel="stylesheet" href="ar.css" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div id="loading-spinner"></div>
    <span>preparing the witness</span>
  </div>

  <!-- HUD top: [souls ←] [scanning center] [→ healing arc] -->
  <div id="hud-top">
    <div id="user-count-pill" class="hud-pill">
      <span id="user-dot" style="font-size:8px; color: rgba(120,200,120,0.7)">●</span>
      <span id="user-count-text">1 soul present</span>
    </div>
    <div id="status-pill" class="hud-pill">
      <span id="status-dot">○</span>
      <span id="status-text">scanning</span>
    </div>
    <div id="healing-hud">
      <svg id="healing-arc" viewBox="0 0 44 44">
        <circle id="arc-bg" cx="22" cy="22" r="18" />
        <circle id="arc-progress" cx="22" cy="22" r="18" />
        <text id="arc-percent" x="22" y="22">0%</text>
      </svg>
      <div id="arc-label">healing</div>
    </div>
  </div>

  <!-- HUD bottom: hint + back -->
  <div id="hud-bottom">
    <div id="hint-pill" class="hud-pill">point camera at hiro marker</div>
    <a id="back-pill" class="hud-pill" href="/">← return</a>
  </div>

  <!-- End message overlay -->
  <div id="end-overlay">
    <div class="end-message">
      <div class="end-line" data-delay="400">With many people speaking up —</div>
      <div class="end-line" data-delay="1800">gun violence will be under control</div>
      <div class="end-line" data-delay="3200">and reduced significantly.</div>
      <div class="end-separator" data-delay="4400"></div>
      <div class="end-tagline" data-delay="4800">The power of many.</div>
      <button id="restart-btn" data-delay="8500">↩ press to restart</button>
    </div>
  </div>

  <!-- Scripts: defer Ably so it doesn't block A-Frame init; pin AR.js to stable 3.4.5 -->
  <script src="https://cdn.ably.com/lib/ably.min-2.js" defer></script>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <!-- Custom components MUST be registered before <a-scene> is parsed -->
  <script src="js/components.js"></script>
  <script src="js/healing-sync.js"></script>
  <script src="js/end-sequence.js"></script>

  <!-- A-Frame scene: `embedded` is REQUIRED for AR.js to composite the camera video correctly
       on mobile Chrome. Without it: black screen + VR button appears regardless of vr-mode-ui.
       sourceWidth/sourceHeight request a 1280x720 camera capture — the extra pixels let the
       marker detector resolve the Hiro pattern at steeper angles and greater distance. -->
  <a-scene
    id="ar-scene"
    embedded
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: false"
    background="transparent: true"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; detectionMode: mono; trackingMethod: best; sourceWidth: 1280; sourceHeight: 720; debugUIEnabled: false; maxDetectionRate: 60"
  >
    <!-- Lighting: required for MeshStandardMaterial to render with color -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.6" position="1 2 1"></a-entity>

    <!-- Heavy pose smoothing: the marker sits on a static table, so averaging
         many frames costs no meaningful latency but strongly suppresses tracking
         jitter. smoothCount=25 averages 25 frames; the wider tolerance/threshold
         enlarge the dead-band so sub-threshold micro-jitter is ignored entirely. -->
    <a-marker preset="hiro" id="hiro-marker" smooth="true" smoothCount="40" smoothTolerance="0.03" smoothThreshold="8">

      <!-- Main character: position Y=-0.18 shifts lower legs to y=-0.04, sinking
           feet slightly into the marker plane for a grounded feel (matches dino demo). -->
      <a-entity
        id="character-root"
        character-animator="healingPercent: 0; mode: a"
        position="0 -0.18 0"
        rotation="0 0 0"
      ></a-entity>

      <!-- Environmental effects -->
      <a-entity tornado-effect="intensity: 1" position="0 0 0"></a-entity>
      <a-entity barbed-wire="intensity: 1" position="0 0 0"></a-entity>
      <a-entity explosion-flash="intensity: 1" position="0 0 0"></a-entity>

    </a-marker>

    <!-- Explicit camera, fixed at the origin with identity rotation. AR.js marker
         mode positions the MARKER in camera space, so the camera must stay at
         identity. With no camera declared, A-Frame injects a default one at
         0 1.6 0 WITH look-controls — the gyroscope then rotates the camera and
         fights marker tracking, so the model drifts off the Hiro surface. -->
    <a-entity
      camera="active: true"
      position="0 0 0"
      rotation="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false"
    ></a-entity>
  </a-scene>

  <script>
    (function () {
      const scene   = document.getElementById('ar-scene');
      const marker  = document.getElementById('hiro-marker');
      const overlay = document.getElementById('loading-overlay');
      const statusPill = document.getElementById('status-pill');
      const statusDot  = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const hintPill   = document.getElementById('hint-pill');
      const arcProgress = document.getElementById('arc-progress');
      const arcPercent  = document.getElementById('arc-percent');
      const arcSvg      = document.getElementById('healing-arc');
      const userCountText = document.getElementById('user-count-text');

      const ARC_CIRCUMFERENCE = 2 * Math.PI * 18; // r=18 → 113.097

      function setScanning() {
        statusDot.textContent = '○';
        statusText.textContent = 'scanning';
        statusPill.className = 'hud-pill scanning';
        hintPill.classList.remove('hidden');
      }

      function setLocked() {
        statusDot.textContent = '●';
        statusText.textContent = 'locked';
        statusPill.className = 'hud-pill locked';
        hintPill.classList.add('hidden');
      }

      function updateHealingArc(percent) {
        const filled = (percent / 100) * ARC_CIRCUMFERENCE;
        arcProgress.style.strokeDasharray = filled + ' ' + ARC_CIRCUMFERENCE;
        arcPercent.textContent = Math.round(percent) + '%';

        // Color lerp: ember (#c4622d) → gold (#d4a843)
        const t = percent / 100;
        const r = Math.round(196 + (212 - 196) * t);
        const g = Math.round(98  + (168 - 98)  * t);
        const b = Math.round(45  + (67  - 45)  * t);
        arcProgress.style.stroke = `rgb(${r},${g},${b})`;
        arcPercent.style.fill = percent > 50
          ? `rgba(212, 168, 67, ${0.4 + t * 0.4})`
          : 'rgba(240, 228, 200, 0.38)';

        // Glow toggles correctly in both directions
        arcSvg.classList.toggle('glowing', percent > 40);
      }

      function updateUserCount(count) {
        userCountText.textContent = count === 1
          ? '1 soul present'
          : count + ' souls present';
      }

      // Listen for healing updates from healing-sync.js
      document.addEventListener('healing-update', function(e) {
        const { percent, userCount } = e.detail;

        // Update healing arc
        updateHealingArc(percent);
        updateUserCount(userCount);

        // Update all effect intensities (1 → 0 as healing progresses)
        const intensity = Math.max(0, 1 - percent / 100);

        const tornado   = document.querySelector('[tornado-effect]');
        const wire      = document.querySelector('[barbed-wire]');
        const explosion = document.querySelector('[explosion-flash]');
        const character = document.getElementById('character-root');

        if (tornado)   tornado.setAttribute('tornado-effect', 'intensity', intensity);
        if (wire)      wire.setAttribute('barbed-wire', 'intensity', intensity);
        if (explosion) explosion.setAttribute('explosion-flash', 'intensity', intensity);
        if (character) character.setAttribute('character-animator', 'healingPercent', percent);
      });

      // The loading overlay is cleared only once the character GLBs have
      // loaded (character-animator dispatches `character-ready`). A safety
      // timeout guarantees the spinner never hangs if a GLB fails to load.
      let overlayCleared = false;
      function clearOverlay() {
        if (overlayCleared) { return; }
        overlayCleared = true;
        overlay.classList.add('fade-out');
        setTimeout(() => overlay.classList.add('hidden'), 900);
      }
      document.addEventListener('character-ready', clearOverlay);
      setTimeout(clearOverlay, 8000);

      // Scene load handler
      scene.addEventListener('loaded', function () {
        setScanning();

        // Start healing sync after scene is ready
        // HealingSync.init() is deferred until Ably CDN has loaded (scene.loaded fires well after)
        if (window.HealingSync) {
          window.HealingSync.init().catch(console.error);
        }
      });

      // Adaptive threshold patch — fixes detection failure on glossy/bright surfaces.
      //
      // Root cause: ARToolKit defaults to a fixed luminance threshold for binarisation
      // (black ink vs white paper). A specular highlight on a glossy Hiro marker surface
      // raises the luminance of dark regions toward the threshold, causing the detector
      // to misclassify them as white background — the square border appears "broken" and
      // no contour is found. High ambient light has the same effect globally.
      //
      // Fix: AR_LABELING_THRESH_MODE_AUTO_MEDIAN (1) — ARToolKit recomputes the threshold
      // each detection cycle as the median pixel luminance of the full frame. This self-
      // corrects for any exposure level because the median always falls between the dark
      // and light populations regardless of how bright or dim the room is.
      //
      // Access path confirmed from AR.js 3.4.5 source:
      //   scene.systems.arjs._arSession.arContext.arController
      // arController is created asynchronously so we poll at 100 ms intervals.
      (function patchAdaptiveThreshold() {
        var attempts = 0;
        var check = setInterval(function () {
          attempts++;
          var arSystem = scene.systems && scene.systems.arjs;
          if (!arSystem || !arSystem._arSession) return;
          var arCtx = arSystem._arSession.arContext;
          if (!arCtx || !arCtx.arController) {
            if (attempts > 100) { clearInterval(check); } // give up after ~10 s
            return;
          }
          clearInterval(check);
          var ctrl = arCtx.arController;
          if (typeof ctrl.setThresholdMode === 'function') {
            ctrl.setThresholdMode(1); // AR_LABELING_THRESH_MODE_AUTO_MEDIAN
          }
        }, 100);
      })();

      var markerEverFound   = false;
      var lightingHintTimer = null;

      marker.addEventListener('markerFound', function () {
        markerEverFound = true;
        if (lightingHintTimer) {
          clearTimeout(lightingHintTimer);
          lightingHintTimer = null;
        }
        // Reset hint text so next scan phase shows the default message
        hintPill.textContent = 'point camera at hiro marker';
        setLocked(); // setLocked() hides hintPill; text is ready for next markerLost→setScanning cycle
      });

      marker.addEventListener('markerLost', function () {
        setScanning();
        if (!markerEverFound) { return; }
        lightingHintTimer = setTimeout(function () {
          hintPill.textContent = 'try better lighting · flatten the marker';
        }, 3000);
      });

    })();
  </script>

</body>
</html>
